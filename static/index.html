<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    header { padding: 14px 20px; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    header .title { font-size: 15px; font-weight: 600; }
    header .model { margin-left: auto; font-size: 11px; color: #555; }

    #thread { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .user-msg { display: flex; justify-content: flex-end; }
    .user-bubble { background: #2a2a5e; color: #e0e0e0; padding: 10px 14px; border-radius: 12px 12px 2px 12px; max-width: 70%; font-size: 13px; white-space: pre-wrap; word-break: break-word; }

    .agent-msg { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
    .agent-bubble { background: #1a1a2e; border: 1px solid #2a2a3e; color: #e0e0e0; padding: 10px 14px; border-radius: 2px 12px 12px 12px; max-width: 75%; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
    .agent-bubble.thinking { color: #555; }
    .agent-bubble.error { color: #e07f7f; }

    .stats-row { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
    .stats { font-size: 10px; color: #555; }
    .toggle-trace { font-size: 10px; color: #7c9ef8; background: none; border: none; cursor: pointer; padding: 0; }

    .trace { background: #0d0d1a; border: 1px solid #2a2a3e; border-radius: 6px; padding: 10px 14px; max-width: 75%; font-size: 11px; color: #888; display: none; flex-direction: column; gap: 5px; }
    .trace.open { display: flex; }
    .trace .step { display: flex; gap: 8px; overflow: hidden; }
    .trace .step-type { min-width: 90px; flex-shrink: 0; color: #555; }
    .trace .step-type.user_input { color: #7c9ef8; }
    .trace .step-type.ai_reasoning { color: #b07fe0; }
    .trace .step-type.tool_call { color: #c9a96e; }
    .trace .step-type.tool_result { color: #7fe07f; }
    .trace .step-type.final_answer { color: #e0e0e0; }
    .trace .msg-type { color: #4a6fa5; min-width: 110px; flex-shrink: 0; font-style: italic; }
    .trace .tool-name { color: #888; min-width: 150px; flex-shrink: 0; }
    .trace .step-content { color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #input-bar { padding: 14px 20px; border-top: 1px solid #2a2a3e; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    #task-input { flex: 1; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 13px; resize: none; min-height: 42px; max-height: 120px; font-family: inherit; line-height: 1.4; }
    #task-input:focus { outline: none; border-color: #7c9ef8; }
    #task-input::placeholder { color: #444; }
    #task-input:disabled { opacity: 0.5; }
    #send-btn { background: #7c9ef8; color: #000; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    #send-btn:disabled { background: #2a2a5e; color: #555; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <span>🤖</span>
    <span class="title">AI Agent</span>
    <span class="model" id="model-label"></span>
  </header>

  <div id="thread"></div>

  <div id="input-bar">
    <textarea id="task-input" aria-label="Task input" placeholder="Ask me anything — math, weather, search, unit conversion…" rows="1"></textarea>
    <button id="send-btn" type="button">Send</button>
  </div>

  <script>
    const thread = document.getElementById('thread');
    const input = document.getElementById('task-input');
    const sendBtn = document.getElementById('send-btn');
    const modelLabel = document.getElementById('model-label');

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTask();
      }
    });

    sendBtn.addEventListener('click', sendTask);

    function setDisabled(disabled) {
      input.disabled = disabled;
      sendBtn.disabled = disabled;
    }

    function scrollToBottom() {
      thread.scrollTop = thread.scrollHeight;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function appendUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'user-msg';
      div.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;
      thread.appendChild(div);
      scrollToBottom();
    }

    function appendThinking() {
      const div = document.createElement('div');
      div.className = 'agent-msg';
      div.innerHTML = `<div class="agent-bubble thinking">Thinking…</div>`;
      thread.appendChild(div);
      scrollToBottom();
      return div;
    }

    function replaceThinking(el, response) {
      const { answer, latency_ms, model } = response;
      const trace = Array.isArray(response.trace) ? response.trace : [];
      const token_usage = response.token_usage ?? {};

      if (!modelLabel.textContent) {
        modelLabel.textContent = model ?? '';
      }

      const steps = trace.length;
      const tokens = Number.isFinite(token_usage.total_tokens) ? token_usage.total_tokens : '—';
      const latency = Number.isFinite(latency_ms) ? latency_ms : '—';

      const answerEl = document.createElement('div');
      answerEl.className = 'agent-bubble';
      answerEl.textContent = answer ?? '';

      const statsRow = document.createElement('div');
      statsRow.className = 'stats-row';

      const statsSpan = document.createElement('span');
      statsSpan.className = 'stats';
      statsSpan.textContent = `↳ ${steps} steps · ${latency}ms · ${tokens} tokens`;
      statsRow.appendChild(statsSpan);

      const traceEl = document.createElement('div');
      traceEl.className = 'trace';

      trace.forEach(s => {
        const step = document.createElement('div');
        step.className = 'step';

        const typeSpan = document.createElement('span');
        typeSpan.className = 'step-type ' + (s.step_type ?? '');
        typeSpan.textContent = s.step_type ?? '';

        const msgTypeSpan = document.createElement('span');
        msgTypeSpan.className = 'msg-type';
        msgTypeSpan.textContent = s.msg_type ?? '';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-name';
        nameSpan.textContent = s.tool_name ?? '';

        const contentSpan = document.createElement('span');
        contentSpan.className = 'step-content';
        contentSpan.textContent = String(s.content ?? '').slice(0, 160);

        step.append(typeSpan, msgTypeSpan, nameSpan, contentSpan);
        traceEl.appendChild(step);
      });

      if (steps > 0) {
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'toggle-trace';
        toggleBtn.type = 'button';
        toggleBtn.textContent = '▶ show trace';
        toggleBtn.addEventListener('click', () => {
          const open = traceEl.classList.toggle('open');
          toggleBtn.textContent = open ? '▼ hide trace' : '▶ show trace';
        });
        statsRow.appendChild(toggleBtn);
      }

      el.innerHTML = '';
      el.append(answerEl, statsRow, traceEl);
      scrollToBottom();
    }

    function showError(el, message) {
      el.innerHTML = `<div class="agent-bubble error">${escapeHtml(message)}</div>`;
      scrollToBottom();
    }

    async function sendTask() {
      const task = input.value.trim();
      if (!task) return;

      input.value = '';
      input.style.height = 'auto';
      setDisabled(true);

      appendUserMessage(task);
      const thinkingEl = appendThinking();

      try {
        const res = await fetch('/task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        replaceThinking(thinkingEl, await res.json());
      } catch (err) {
        showError(thinkingEl, 'Error: ' + err.message);
      } finally {
        setDisabled(false);
        input.focus();
      }
    }
  </script>
</body>
</html>
